<!-- templates/analyze.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>岩心图像分析</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Microsoft YaHei', sans-serif; }
        .header { background: linear-gradient(to right, #4e342e, #6d4c41); color: white; padding: 1.5rem 0; margin-bottom: 2rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card { border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); margin-bottom: 1.5rem; }
        .param-card { background-color: #efebe9; border-left: 4px solid #6d4c41; }
        .image-container { border: 1px solid #dee2e6; border-radius: 5px; padding: 10px; background-color: white; margin-bottom: 1rem; text-align: center; }
        .image-container img { max-width: 100%; max-height: 400px; object-fit: contain; }
        .progress-container { background-color: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: none; }
        .result-panel { display: none; }
        .btn-custom { background-color: #4e342e; color: white; border-radius: 30px; padding: 10px 25px; font-weight: bold; transition: all 0.3s; }
        .btn-custom:hover { background-color: #6d4c41; color: white; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .result-summary { background-color: #efebe9; border-radius: 10px; padding: 15px; margin-top: 20px; }
        .summary-item { text-align: center; padding: 10px; }
        .summary-number { font-size: 2rem; font-weight: bold; color: #4e342e; }
        .info-box { background-color: #e8f0fe; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .info-box h6 { color: #4e342e; }
        .analysis-type-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .analysis-type-btn {
            flex: 1;
            border: 2px solid #6d4c41;
            background-color: white;
            color: #4e342e;
            border-radius: 8px;
            padding: 8px 0;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .analysis-type-btn:hover { background-color: #f5f0eb; }
        .analysis-type-btn.active {
            background-color: #4e342e;
            color: white;
            border-color: #4e342e;
        }
        .analysis-type-btn i { display: block; font-size: 1.2rem; margin-bottom: 3px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <h1 class="h3 mb-0">岩心图像分析</h1>
                <a href="/" class="btn btn-light btn-sm"><i class="bi bi-house-door"></i> 返回首页</a>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="row">
            <div class="col-lg-4">
                <div class="card param-card">
                    <div class="card-body">
                        <h5 class="card-title mb-4">分析说明</h5>
                        <div class="info-box">
                            <h6><i class="bi bi-info-circle"></i> 自动分析</h6>
                            <p class="text-muted small mb-0">系统将自动检测岩心图像中的孔洞、裂缝和颗粒结构，无需手动设置参数。</p>
                        </div>
                        <div class="info-box">
                            <h6><i class="bi bi-check-circle"></i> 检测内容</h6>
                            <ul class="text-muted small mb-0">
                                <li><span style="color: #ff0000;">●</span> 孔洞检测（红色标注）</li>
                                <li><span style="color: #0000ff;">●</span> 裂缝检测（蓝色标注）</li>
                                <li><span style="color: #00aa00;">●</span> 颗粒检测（绿色标注）</li>
                            </ul>
                        </div>
                        <div class="info-box">
                            <h6><i class="bi bi-clock"></i> 处理时间</h6>
                            <p class="text-muted small mb-0">通常 3-8 秒完成分析</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title mb-4">岩心图像</h5>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="image-container">
                                    <img src="/uploads_folder/{{ image_path.split('\\')[-1] if '\\' in image_path else image_path.split('/')[-1] }}"
                                         alt="原始岩心图像" class="img-fluid" id="original-image">
                                    <div class="mt-2 text-muted">原始图像</div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="image-container">
                                    <img src="" alt="分析结果" class="img-fluid" id="result-image" style="display: none;">
                                    <div class="mt-2 text-muted">分析结果</div>
                                </div>
                            </div>
                        </div>

                        <!-- 分析类型选择 -->
                        <div class="mt-3">
                            <label class="form-label fw-bold" style="color: #4e342e;">选择分析类型</label>
                            <div class="analysis-type-group">
                                <div class="analysis-type-btn active" data-type="all">
                                    <i class="bi bi-layers"></i> 全部
                                </div>
                                <div class="analysis-type-btn" data-type="holes">
                                    <i class="bi bi-circle"></i> 孔洞
                                </div>
                                <div class="analysis-type-btn" data-type="cracks">
                                    <i class="bi bi-lightning"></i> 裂缝
                                </div>
                                <div class="analysis-type-btn" data-type="grains">
                                    <i class="bi bi-grid-3x3"></i> 粒度
                                </div>
                            </div>
                        </div>

                        <div class="d-grid mt-3">
                            <button type="button" class="btn btn-custom btn-lg mb-3" id="start-analysis">
                                <i class="bi bi-play-circle"></i> 开始自动分析
                            </button>
                            <a href="/results" class="btn btn-custom btn-lg" id="view-results-btn" style="display: none;">
                                <i class="bi bi-table"></i> 查看详细结果
                            </a>
                        </div>
                        <div class="progress-container mt-4" id="progress-container" style="display: none;">
                            <h6 class="mb-3">分析进度</h6>
                            <div class="progress mb-3" style="height: 20px;">
                                <div class="progress-bar progress-bar-striped progress-bar-animated"
                                     role="progressbar" style="width: 0%"
                                     aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"
                                     id="progress-bar"></div>
                            </div>
                            <p class="text-center mb-0" id="progress-text">正在初始化分析...</p>
                        </div>
                        <div class="result-summary mt-4" id="result-summary" style="display: none;">
                            <h6 class="mb-3">分析结果摘要</h6>
                            <div class="row">
                                <div class="col-4 summary-item">
                                    <div class="summary-number" id="holes-count">0</div>
                                    <div>孔洞</div>
                                </div>
                                <div class="col-4 summary-item">
                                    <div class="summary-number" id="cracks-count">0</div>
                                    <div>裂缝</div>
                                </div>
                                <div class="col-4 summary-item">
                                    <div class="summary-number" id="grains-count">0</div>
                                    <div>颗粒</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="result-panel" id="action-panel">
                    <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-3">
                        <a href="/report" class="btn btn-custom me-md-2" target="_blank">
                            <i class="bi bi-file-earmark-pdf"></i> 生成报告
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let selectedAnalysisType = 'all';

        // 分析类型选择
        document.querySelectorAll('.analysis-type-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.analysis-type-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedAnalysisType = this.getAttribute('data-type');
            });
        });

        document.getElementById('start-analysis').addEventListener('click', function() {
            this.disabled = true;
            this.innerHTML = '<i class="bi bi-hourglass-split"></i> 分析中...';
            document.getElementById('progress-container').style.display = 'block';
            document.getElementById('progress-bar').style.width = '10%';
            document.getElementById('progress-text').textContent = '正在准备分析...';
            fetch('/process', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ analysis_type: selectedAnalysisType })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    document.getElementById('progress-text').textContent = '分析错误: ' + data.error;
                    this.disabled = false;
                    this.innerHTML = '<i class="bi bi-play-circle"></i> 开始自动分析';
                    return;
                }
                document.getElementById('progress-bar').style.width = '60%';
                document.getElementById('progress-text').textContent = '正在生成结果...';
                const resultImage = document.getElementById('result-image');
                resultImage.src = data.result_image;
                resultImage.style.display = 'block';
                document.getElementById('holes-count').textContent = data.summary.holes;
                document.getElementById('cracks-count').textContent = data.summary.cracks;
                document.getElementById('grains-count').textContent = data.summary.grains;
                document.getElementById('result-summary').style.display = 'block';
                document.getElementById('progress-bar').style.width = '100%';
                document.getElementById('progress-text').textContent = '分析完成!';

                setTimeout(() => {
                    document.getElementById('view-results-btn').style.display = 'block';
                    document.getElementById('action-panel').style.display = 'block';
                    this.disabled = false;
                    this.innerHTML = '<i class="bi bi-play-circle"></i> 重新分析';
                }, 500);
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('progress-text').textContent = '发生错误: ' + error.message;
                this.disabled = false;
                this.innerHTML = '<i class="bi bi-play-circle"></i> 开始自动分析';
            });
        });
    </script>
</body>
</html>
